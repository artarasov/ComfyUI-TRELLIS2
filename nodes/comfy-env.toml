[cuda]
packages = ["flex_gemm_ap", "cumesh_vb", "o_voxel_vb_ap", "flash-attn", "sageattention", "drtk"]

[dependencies]
av = "*"

[target.linux-64.dependencies]
c-compiler = "*"

[pypi-dependencies]
# HuggingFace models
huggingface_hub = ">=0.20.0,<1.0.0"
hf_transfer = "*"
hf_xet = "*"
transformers = ">=4.56.0"
safetensors = "*"
timm = "*"
comfy-aimdo = "*"
comfy-sparse-attn = "*"
trimesh = { version = "*", extras = ["easy"] }
plyfile = "*"
zstandard = "*"

# Image processing
pillow = ">=9.0.0"
opencv-python-headless = "*"
imageio = ">=2.0.0"

# General
numpy = ">=1.21.0"
easydict = "*"
tqdm = "*"

# Optional Draco mesh compression (KHR_draco_mesh_compression GLB export).
# Imported lazily from _draco_compress_glb in nodes_unwrap.py; when these are
# missing the node logs a warning and skips compression. They must live in
# this pixi env because Trellis2 nodes execute in an isolated subprocess.
smtk_draco = "*"
pygltflib = "*"

[env_vars]
PYTORCH_CUDA_ALLOC_CONF = "expandable_segments:True"

[target.linux-64.pypi-dependencies]
triton = ">=3.0.0"

[target.win-64.pypi-dependencies]
triton-windows = ">=3.5.0"